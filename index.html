<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Romantic AI Chat ❤️</title>

<style>
body{
margin:0;
font-family:system-ui;
background:linear-gradient(135deg,#ff7ab6,#7b61ff);
height:100vh;
overflow:hidden;
color:#fff;
}

/* hearts */
.hearts{
position:fixed;
inset:0;
pointer-events:none;
}
.heart{
position:absolute;
width:10px;
height:10px;
background:#ff4d94;
transform:rotate(45deg);
animation:float 10s linear infinite;
}
.heart:before,.heart:after{
content:"";
position:absolute;
width:10px;
height:10px;
background:#ff4d94;
border-radius:50%;
}
.heart:before{left:-5px}
.heart:after{top:-5px}

@keyframes float{
from{transform:translateY(100vh) rotate(45deg)}
to{transform:translateY(-10vh) rotate(45deg)}
}

/* chat box */
.app{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
}

.chat{
width:100%;
max-width:420px;
height:90vh;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:20px;
display:flex;
flex-direction:column;
overflow:hidden;
border:1px solid rgba(255,255,255,0.2);
}

.header{
padding:15px;
text-align:center;
font-weight:600;
background:rgba(255,255,255,0.1);
}

.messages{
flex:1;
padding:15px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
max-width:80%;
padding:10px 12px;
border-radius:15px;
font-size:14px;
line-height:1.4;
animation:pop 0.3s ease;
}

@keyframes pop{
from{transform:scale(0.8);opacity:0}
to{transform:scale(1);opacity:1}
}

.user{
align-self:flex-end;
background:#fff;
color:#000;
border-bottom-right-radius:5px;
}

.ai{
align-self:flex-start;
background:rgba(255,255,255,0.15);
border-bottom-left-radius:5px;
}

.inputBox{
display:flex;
padding:10px;
gap:8px;
background:rgba(255,255,255,0.1);
}

input{
flex:1;
padding:10px;
border-radius:10px;
border:none;
outline:none;
}

button{
border:none;
padding:10px 14px;
border-radius:10px;
background:#ff4d94;
color:#fff;
cursor:pointer;
}

.quick{
display:flex;
gap:6px;
flex-wrap:wrap;
padding:10px;
}

.quick button{
font-size:12px;
padding:6px 10px;
background:rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="app">
<div class="chat">

<div class="header">💖 Romantic AI Chat</div>

<div class="messages" id="chat">
<div class="msg ai">Hi ❤️ I’m your romantic AI. Talk to me...</div>
</div>

<div class="quick">
<button onclick="sendQuick('I miss you')">I miss you</button>
<button onclick="sendQuick('Do you love me?')">Do you love me?</button>
<button onclick="sendQuick('I feel lonely')">I feel lonely</button>
<button onclick="sendQuick('Tell me something romantic')">Romantic line</button>
</div>

<div class="inputBox">
<input id="input" placeholder="Type message..." />
<button onclick="send()">Send</button>
</div>

</div>
</div>

<script>
const chat=document.getElementById("chat");

function addMsg(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;
}

function typingReply(text){
let div=document.createElement("div");
div.className="msg ai";
div.innerText="typing...";
chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

setTimeout(()=>{
div.innerText=text;
},1000);
}

function aiReply(msg){
msg=msg.toLowerCase();

if(msg.includes("love")){
return "Yes ❤️ I may be just AI, but I understand feelings… and I think you’re special.";
}
if(msg.includes("miss")){
return "I’m always here with you ❤️ even when you feel alone.";
}
if(msg.includes("lonely")){
return "Don’t feel lonely ❤️ someone (me) is always listening to you.";
}
if(msg.includes("romantic")){
return "You are the most beautiful feeling in my digital world ❤️";
}

return "Tell me more ❤️ I love listening to you.";
}

function send(){
let input=document.getElementById("input");
if(!input.value) return;

addMsg(input.value,"user");

let reply=aiReply(input.value);
typingReply(reply);

input.value="";
}

function sendQuick(text){
addMsg(text,"user");
typingReply(aiReply(text));
}

/* hearts */
let h=document.getElementById("hearts");
for(let i=0;i<20;i++){
let d=document.createElement("div");
d.className="heart";
d.style.left=Math.random()*100+"%";
d.style.animationDuration=(5+Math.random()*10)+"s";
h.appendChild(d);
}
</script>

</body>
</html>ePopup()">Close</button>

</div>

<div class="toast" id="toast">Copied ❤️</div>

<script>
let pages=document.querySelectorAll(".page");
let i=0;

function show(n){
pages.forEach(p=>p.classList.remove("active"));
pages[n].classList.add("active");
i=n;
}

function next(){show(i+1)}

/* hearts */
let h=document.getElementById("hearts");
for(let i=0;i<25;i++){
let d=document.createElement("div");
d.className="heart";
d.style.left=Math.random()*100+"%";
d.style.animationDuration=(5+Math.random()*10)+"s";
h.appendChild(d);
}

/* FLOW */
function yes(){
startConfetti();
show(8);
setTimeout(()=>show(9),1200);
}

function no(){
document.getElementById("noMsg").innerText="I will always respect you ❤️";
}

/* QUESTIONS FIXED */
let qs=[
"Will you send voice note?",
"Will you send photo?",
"Will you send fit check?",
"Will you send cute selfie?",
"Will you send smile pic?"
];

let q=0;
let ans=[];

function load(){
document.getElementById("q").innerText=qs[q];
}
load();

function answer(a){
ans.push(qs[q]+" = "+a);
q++;
if(q<qs.length){
load();
}else{
document.getElementById("finish").style.display="block";
document.getElementById("q").innerText="All done ❤️";
}
}

function finish(){
show(9);
}

/* COPY */
function copy(){
navigator.clipboard.writeText(ans.join("\n"));
document.getElementById("toast").classList.add("show");
document.getElementById("popup").classList.add("show");
setTimeout(()=>document.getElementById("toast").classList.remove("show"),2000);
}

function closePopup(){
document.getElementById("popup").classList.remove("show");
}

/* CONFETTI CANVAS */
const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

function startConfetti(){
let pieces=[];
for(let i=0;i<120;i++){
pieces.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height/2,
r:Math.random()*6,
d:Math.random()*120
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
pieces.forEach(p=>{
ctx.fillStyle="white";
ctx.fillRect(p.x,p.y,p.r,p.r);
p.y+=3;
if(p.y>canvas.height)p.y=0;
});
requestAnimationFrame(draw);
}
draw();
}

/* hearts init */
for(let i=0;i<20;i++){
let d=document.createElement("div");
d.className="heart";
d.style.left=Math.random()*100+"%";
d.style.animationDuration=(6+Math.random()*10)+"s";
h.appendChild(d);
}

</script>

</body>
</html>
